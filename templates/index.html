<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hogwarts AI Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 700px;
            margin: 60px auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            text-align: center;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
        }

        button {
            margin-top: 12px;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #222;
            color: white;
        }

        .box {
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            white-space: pre-wrap;
        }

        .label {
            font-weight: bold;
            margin-bottom: 6px;
        }

        .error {
            color: #b00020;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hogwarts AI Chat</h1>
        <p>Type a message and get an AI response.</p>

        <textarea id="message" placeholder="Enter your message..."></textarea>
        <button onclick="sendMessage()">Send</button>

        <div class="box">
            <div class="label">AI Response:</div>
            <div id="response">Your AI answer will appear here.</div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const messageInput = document.getElementById("message");
            const responseBox = document.getElementById("response");
            const message = messageInput.value.trim();

            if (!message) {
                responseBox.innerHTML = '<span class="error">Please enter a message.</span>';
                return;
            }

            responseBox.textContent = "Loading...";

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                if (!response.ok) {
                    responseBox.innerHTML = `<span class="error">${data.error || "Error occurred."}</span>`;
                    return;
                }

                responseBox.textContent = data.reply;
            } catch (error) {
                responseBox.innerHTML = '<span class="error">Failed to connect to server.</span>';
            }
        }
    </script>
</body>
</html>
